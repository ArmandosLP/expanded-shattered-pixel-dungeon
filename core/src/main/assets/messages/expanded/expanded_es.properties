## ------------------------- ITEMS ------------------------- ##

## TRINKETS
expanded.items.trinkets.luckycoin.name=moneda de la suerte
expanded.items.trinkets.luckycoin.desc=Las leyendas cuentan que esta moneda pertenecio a un rey avaro que le gano a la fortuna misma en un juego de cara o cruz. El ornamento parece atraer mas oro hacia su portador y expandir sus oportunidades de negocio.
expanded.items.trinkets.luckycoin.stats_desc=En su nivel actual este ornamento aumenta la cantidad de oro que encuentres en la mazmorra en un _%1$s%%_, y los vendedores tendran _%2$d_ objetos adicionales a la venta.\n\nEste ornamento cuesta una gran cantidad de energía para ser mejorado.
expanded.items.trinkets.luckycoin.typical_stats_desc=Típicamente este ornamento aumenta la cantidad de oro que encuentres en la mazmorra en un _%1$s%%_, y los vendedores tendran _%2$d_ objetos adicionales a la venta.\n\nEste ornamento cuesta una gran cantidad de energía para ser mejorado.


expanded.items.trinkets.woodenspoon.name=Cucharra de madera
expanded.items.trinkets.woodenspoon.desc=La madera es resistente cuando lo trabaja un maestro, pero esta cuchara, a pesar de su edad, ha mantenido su forma tan perfectamente que parece magia. Quienquiera que haya sido su dueño ya no está entre nosotros, pero sus obras culinarias perduran.
expanded.items.trinkets.woodenspoon.typical_stats_desc=Típicamente este ornamento _transforma toda la comida_ de la mazmorra, sustituyéndola por _variantes que otorgan beneficios_ al consumirlas.
expanded.items.trinkets.woodenspoon.stats_desc=En su nivel actual este ornamento _transforma toda la comida_ de la mazmorra, sustituyéndola por _variantes que otorgan %s beneficios_ al consumirlas.
expanded.items.trinkets.woodenspoon.level_tiny=pequeños
expanded.items.trinkets.woodenspoon.level_modest=modestos
expanded.items.trinkets.woodenspoon.level_large=grandes
expanded.items.trinkets.woodenspoon.level_huge=enormes
expanded.items.trinkets.woodenspoon.react=Este objeto está reaccionando con tu _cuchara de madera_.
expanded.items.trinkets.woodenspoon.function=Este objeto tiene las mismas funcionalidades que _%s_.
expanded.items.trinkets.woodenspoon.pie_placeholder_name=Quien sabe lo que saldra de aqui.


## WEAPONS
items.weapon.melee.morningstar.name=Lucero del alba
items.weapon.melee.morningstar.desc=Un arma ligera con una cabeza pesada, capaz de asestar golpes contundentes con la técnica adecuada.
items.weapon.melee.morningstar.stats_desc=Esta arma se beneficia mas del exceso de fuerza.
items.weapon.melee.morningstar.excess_str=Debido a tu exceso de fuerza, causarás _%s-%d de daño adicional_ con esta arma.
items.weapon.melee.morningstar.ability_name=golpe a la cabeza
items.weapon.melee.morningstar.typical_ability_desc=La Duelista puede realizar un _golpe a la cabeza_ con un lucero del alba star. Este ataque normalmente inflige _%1$d-%2$d de daño_ y esta garantizado a acertar. Si el ataque sorprende al enemigo, lo _paraliza durante un turno_.
items.weapon.melee.morningstar.ability_desc=La Duelista puede realizar un _golpe a la cabeza_ con un lucero del alba star. Este ataque inflige _%1$d-%2$d de daño_ y esta garantizado a acertar. Si el ataque sorprende al enemigo, lo _paraliza durante un turno_.


## FOOD
expanded.items.food.bun.name=Bollo
expanded.items.food.bun.desc=Un bollo suave relleno de ternera.
expanded.items.food.bun.spoon_buff=La suave piel del bollo te hace sentir protegido, otorgándote _%d_ de blindaje.

expanded.items.food.honey.name=Miel
expanded.items.food.honey.desc=Un tarro lleno de deliciosa miel.
expanded.items.food.honey.spoon_buff=La dulzura de la miel hace que te sientas vido, restaurando _%d_ de salud.

expanded.items.food.wheatbread.name=Pan de trigo
expanded.items.food.wheatbread.desc=Un hogaza de pan blanco con el interior tierno y el exterior crujiente.
expanded.items.food.wheatbread.spoon_buff=La energía que obtienes de todos los granos hace que tu piel sea más difícil de penetrar, reduciendo el daño recibido de _%d_ ataques.

expanded.items.food.ryebread.name=Pan de centeno
expanded.items.food.ryebread.desc=Una hogaza de pan integral con un aroma increíble y una textura que no es ni dura ni blanda.
expanded.items.food.ryebread.spoon_buff=El exceso de grasa que aportan los granos absorbe hasta _%d_ de daño. Sin embargo, esta grasa se quema fácilmente al moverse.

expanded.items.food.driedmeat.name=Cecina
expanded.items.food.driedmeat.desc=Un trozo de carne bastante difícil de masticar, pero muy nutritivo.
expanded.items.food.driedmeat.spoon_buff=Este ligero aperitivo te levanta el ánimo, garantizando _%d_ efectos positivos aleatorios.
expanded.items.food.driedmeat.spoon_buff_variant=Este ligero aperitivo te anima, garantizando entre _%d_ o _%d_ efectos positivos aleatorios.
expanded.items.food.driedmeat.inspier=¡Tu mente se llena de inspiracion!
expanded.items.food.driedmeat.energy=¡Te sientes lleno de energía!
expanded.items.food.driedmeat.better=¡Te sientes mejor!
expanded.items.food.driedmeat.mindvis=¡Puedes verlo todo!
expanded.items.food.driedmeat.refresh=¡Refrescante!

expanded.items.food.ribs.name=Costillas
expanded.items.food.ribs.desc=Tiernos trozos de carne adheridos a un hueso muy grueso.
expanded.items.food.ribs.spoon_buff=El aroma de un aperitivo tan delicioso te levanta el animo, garantizando _%d_ efectos positivos aleatorios.
expanded.items.food.ribs.spoon_buff_variant=El aroma de un aperitivo tan delicioso te levanta el animo, garantizando entre _%d_ o _%d_ efectos positivos aleatorios.
expanded.items.food.ribs.inspier=¡Tu mente se llena de inspiracion!
expanded.items.food.ribs.energy=¡Te sientes lleno de energía!
expanded.items.food.ribs.hard=¡Sientes que tu piel se endurece!
expanded.items.food.ribs.invis=¡Ves tus manos volverse invisibles!
expanded.items.food.ribs.nature=¡Sientes una conexión con la naturaleza!

expanded.items.food.pasta.name=Pasta
expanded.items.food.pasta.desc=Este plato altamente nutritivo era consumido únicamente por los guardias de la prisión. Algunos rumores indican que altos funcionarios contaminaban la comida con sustancias que volvían a los guardias más fuertes y violentos hacia los prisioneros.
expanded.items.food.pasta.spoon_buff=Los rumores eran ciertos: la sustancia que contiene este plato perturba a quien lo consume, llevándolo a un estado de frenesí que aumenta el daño de su próximo ataque en un _%1$s%%_.

expanded.items.food.gruel.name=Gacha
expanded.items.food.gruel.desc=Este característico plato era el alimento principal de todo prisionero. Es muy nutritivo, pero tiene un olor y una textura desagradables debido a la mezcla indiscriminada de ingredientes. Y por si fuera poco, algunos guardias a veces añadían picantes extremos para prolongar el sufrimiento de los reclusos más violentos.
expanded.items.food.gruel.spoon_buff=El picante extremo lleva al a un estado de ferocidad que dura _%d_ ataques y aumenta el daño infligido en función de la duración del efecto.

expanded.items.food.goldenberry.name=Baya dorada
expanded.items.food.goldenberry.desc=A pesar de su distintivo tono dorado, la baya dorada es difícil de ver, incluso para alguien de vista tan aguda como la cazadora.
expanded.items.food.goldenberry.spoon_buff=La increíble dulzura de la baya dorada la hace irresistible y capaz de proporcionar _%d_ de blindaje a quien la consume.

expanded.items.food.survivalration.name=Ración de supervivencia
expanded.items.food.survivalration.desc=Esta ración fue abandonada por un miembro del Gremio de Ladrones. La has encontrado, pero ¿a qué precio? Las raciones de supervivencia son la última esperanza de un ladrón; abandonarlas es señal de que quien las dejó no logró sobrevivir.
expanded.items.food.survivalration.spoon_buff=Hay una nota detrás de la lata.\n\n"Ya no hay esperanza para mi, pero tú aún puedes escapar. Usa esta ración con precaución, te hará invisible al consumirla."\n\nLa invisibilidad durará _%d_ turnos.

expanded.items.food.hunterssandwich.name=Sandwich de cazador
expanded.items.food.hunterssandwich.desc=Este delicioso sándwich era utilizado por comerciantes y cazadores para mantenerse saciados mientras recorrían largas distancias
expanded.items.food.hunterssandwich.spoon_buff=Además de saciar mucho más que cualquier otra comida, este aumentará el daño que infliges en _%d_ mientras estés bien alimentado, y también incrementará permanentemente tu salud máxima en _%d_.
expanded.items.food.hunterssandwich.huntress_special_buff=Como cazadora que eres, este sándwich te acompañó en casi todos tus viajes por el mundo. Este sandwitch te recuerda a tu hogar y a la promesa de salir de aquí con vida. _El sándwich del cazador llena a la cazadora de determinación_.

expanded.items.food.tartedebry.name=Tarta de Brie
expanded.items.food.tartedebry.desc=Esta dulce tarta resulta irresistible para cualquiera, siendo uno de los postres más populares entre la realeza.
expanded.items.food.tartedebry.spoon_buff=Además de saciar mucho más que cualquier otra comida, esta reducirá el daño que recibes en _%d_ mientras estés bien alimentado. También aumentará permanentemente tu salud máxima en _%d_.
expanded.items.food.tartedebry.cleric_special_buff=Como clérigo perteneciente a la familia real, tuviste muchas oportunidades de probar este lujoso postre. Este postre te recuerda a tu hogar y a la promesa de salir de aquí con vida. _La Tarta de Brie llena al clérigo de determinación_.

## ------------------------- BUFFS ------------------------- ##

expanded.actors.buffs.frenzy.name=Frenesí
expanded.actors.buffs.frenzy.desc=La mente ansía sangre; el cuerpo debe obedecer.\n\nLos próximos _%d_ ataques infligirán un _%s%%_ más de daño.

expanded.actors.buffs.ferocity.name=Ferocidad
expanded.actors.buffs.ferocity.desc=El cuerpo arde por dentro y solo hay una forma de calmarlo.\n\nCada ataque inflige _daño adicional igual a la duración del efecto_ y la reduce en uno.\n\nTurnos restantes y daño adicional: _%d_.

expanded.items.food.wheatbread$carbohydraterush.name=Subidón de carbohidratos
expanded.items.food.wheatbread$carbohydraterush.desc=Las grandes cantidades de carbohidratos que has consumido provocan la acumulación de una capa de grasa que protege los órganos vitales.\n\nEsta grasa reduce el daño que recibes en _1_ para los siguientes _%d_ ataques.\n\nSi sigues comiendo cereales, podrías ganar más grasa.

expanded.items.food.ryebread$carbohydraterush.name=Subidón de carbohidratos
expanded.items.food.ryebread$carbohydraterush.desc=Las grandes cantidades de carbohidratos que has consumido provocan la acumulación de una capa de grasa que protege los órganos vitales.\n\nEsta grasa absorbe hasta _%d_ de daño, pero puede quemarse rápidamente con solo moverse.\n\nSi sigues comiendo cereales, podrías ganar más grasa.

expanded.actors.buffs.soulpact.name=Pacto de alma
expanded.actors.buffs.soulpact.desc=Pactaste con el Deambulador a cambio de bienes.\n\nEl pacto de alma reduce tu salud maxima en _%d_, pero no puede reducirla por debajo de 1.\n\nEsta decisión te perseguira hasta el final.\n¿Valio la pena?

actors.buffs.wellfed.hunter_sandwich_desc=Te sientes bastante satisfecho y lleno.\n\nMientras estás bien alimentado, tu apetito no aumentará y podrás sanar una cantidad adicional de salud con el tiempo.\n\nAdicionalmente, el sandwich de cazador hace que te sientas mas fuerte, causando _%d_ de daño extra.\n\nTurnos restantes: %d.
actors.buffs.wellfed.tarte_de_bry_desc=Te sientes bastante satisfecho y lleno.\n\nMientras estás bien alimentado, tu apetito no aumentará y podrás sanar una cantidad adicional de salud con el tiempo.\n\nAdicionalmente, la tarta de brie hace que te sientas mas resistente, reduciendo en _%d_ el daño recibido.\n\nTurnos restantes: %d.
actors.buffs.wellfed.combo_desc=Te sientes bastante satisfecho y lleno.\n\nMientras estás bien alimentado, tu apetito no aumentará y podrás sanar una cantidad adicional de salud con el tiempo.\n\nAdicionalmente, la tarta de brie y el sandwich de cazador hacen que te sientas mas fuerte y resistente, aumentando en _%d_ el daño causado y reduciendo en _%d_ el recibido.\n\nTurnos restantes: %d.

## ------------------------- GLYPHS ------------------------- ##

expanded.items.armor.glyphs.vitality.name=%s de vitalidad
expanded.items.armor.glyphs.vitality.desc=Este glifo se adhiere al cuerpo del portador para mejorar su salud aumentado su vida maxima.

## ------------------------- NPC ------------------------- ##

expanded.actors.npc.wanderingimp.name=Deambulador
expanded.actors.npc.wanderingimp.desc=Una criatura con aspecto demoniaco adornado con numerosas joyas. Su vestimenta de algodón color lapislázuli deja en evidencia su riqueza.\n\nNadie llega a ser tan rico sin pisotear a todo aquel que se le cruce.
expanded.actors.npc.wanderingimp.interact=¡Un humano que no está loco! Eso si que es raro de encontrar.\n\n¿Te gustaría disfrutar de mis mercancías?\nOh no, no quiero tu oro, quiero otra cosita,\nquiero tu alma >:)\nNo toda, solo un pedacito, o lo que estés dispuesto a ofrecerme. A cambio, puedes quedarte con algunas de mis mercancías.\n\nTengo que irme muy pronto, así que no abandones este piso hasta que hayas terminado aquí.
expanded.actors.npc.wanderingimp.yell=Acercate %s, tal vez podamos negociar.
expanded.windows.wndsoultradeitem.pact=Pactar por %d de alma